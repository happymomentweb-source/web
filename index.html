<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HappyMoment.web</title>

<!-- ฟอนต์สวย -->
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&family=Itim&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Kanit', sans-serif;
    background: linear-gradient(135deg, #e6f7ff, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* กล่องหลัก */
.container {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(12px);
    border-radius: 25px;
    padding: 40px;
    width: 90%;
    max-width: 480px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    text-align: center;
}

/* หัวเว็บ */
h1 {
    font-family: 'Itim', cursive;
    font-size: 28px;
    background: linear-gradient(45deg, #7dd3fc, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

.sub {
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 25px;
    line-height: 1.5;
    word-wrap: break-word;
}

/* กล่อง */
.box {
    background: linear-gradient(135deg, #f0faff, #ffffff);
    border-radius: 15px;
    padding: 20px;
    margin: 12px 0;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    transition: 0.3s;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

.box:hover {
    transform: translateY(-5px);
}

/* หัวข้อ */
.box h3 {
    margin: 0 0 10px 0;
    color: #38bdf8;
    font-weight: 500;
    font-size: 16px;
    line-height: 1.4;
}

/* ราคา */
.price {
    font-weight: bold;
    color: #0ea5e9;
    font-size: 18px;
    margin: 8px 0;
}

/* เร่งด่วน */
.urgent {
    border: 2px dashed #38bdf8;
}

/* ปุ่ม */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 25px;
    background: linear-gradient(45deg, #7dd3fc, #38bdf8);
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(56,189,248,0.4);
}

/* ข้อความ */
.box p {
    margin: 8px 0;
    line-height: 1.5;
    font-size: 14px;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(56,189,248,0.6);
}

/* ปรับขนาดสำหรับหน้าจอเล็ก */
@media (max-width: 480px) {
    body {
        padding: 10px;
    }

    .container {
        padding: 20px;
        width: 95%;
    }

    h1 {
        font-size: 24px;
    }

    .box {
        padding: 12px;
    }

    .btn {
        padding: 10px 20px;
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>HappyMoment.web 💙</h1>
    <div class="sub">รับทำเว็บน่ารักๆ สำหรับคนพิเศษของคุณ</div>

    <div class="box">
        <h3>🎂 วันเกิดแฟน</h3>
        <p class="price">129 บาท</p>
        <p>รอ 1-3 วัน</p>

    </div>

    <div class="box">
        <h3>💑 วันครบรอบ</h3>
        <p class="price">199 บาท</p>
        <p>รอ 1-3 วัน</p>

    </div>

    <div class="box">
        <h3>💌 ให้กำลังใจแฟน</h3>
        <p class="price">99 บาท</p>
        <p>รอ 1-3 วัน</p>

    </div>

    <div class="box urgent">
        <h3>⚡ แบบเร่งด่วน (ภายใน 24 ชม.)</h3>
        <p>🎂 วันเกิดแฟน 229 บาท</p>
        <p>💑 วันครบรอบ 299 บาท</p>
        <p>💌 ให้กำลังใจ 199 บาท</p>
    </div>

    <a href="#" class="btn">แอดไลน์ @238snzcp</a>
</div>

</body>
</html>
