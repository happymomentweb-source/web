<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HappyMoment.web</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&family=Itim&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Kanit', sans-serif;
    background: linear-gradient(135deg, #ffe4ec, #ffffff);
    display: flex;
    justify-content: center;
    padding: 40px 15px;
}

/* กล่องหลัก */
.container {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(12px);
    border-radius: 25px;
    padding: 35px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 10px 30px rgba(255, 105, 135, 0.15);
    text-align: center;
}

/* หัวเว็บ */
h1 {
    font-family: 'Itim', cursive;
    font-size: 32px;
    letter-spacing: 1px;
    background: linear-gradient(45deg, #ff8fab, #ff4d88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 5px 15px rgba(255, 105, 135, 0.3);
    margin-bottom: 10px;
}

.sub {
    color: #8b5e6e;
    font-size: 14px;
    margin-bottom: 25px;
}

/* กล่อง */
.box {
    background: linear-gradient(135deg, #fff0f5, #ffffff);
    border-radius: 15px;
    padding: 18px;
    margin: 12px 0;
    text-align: center;
    box-shadow: 0 5px 15px rgba(255, 105, 135, 0.1);
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-5px);
}

/* หัวข้อ */
.box h3 {
    margin: 0 0 10px;
    color: #ff4d88;
    font-size: 17px;
    font-weight: 500;
}

/* ราคา */
.price {
    display: inline-block;
    background: linear-gradient(45deg, #ff8fab, #ff4d88);
    color: white;
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: bold;
    margin: 8px 0;
    box-shadow: 0 3px 10px rgba(255, 105, 135, 0.3);
}

/* รายละเอียด */
.box p {
    margin: 6px 0;
    font-size: 14px;
    color: #6b4b55;
}

/* เร่งด่วน */
.urgent {
    border: 2px dashed #ff4d88;
    background: linear-gradient(135deg, #ffe4ec, #ffffff);
}

/* section */
.section-title {
    font-size: 14px;
    color: #ff4d88;
    font-weight: bold;
    margin-bottom: 10px;
}

/* ปุ่ม */
.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 28px;
    border-radius: 25px;
    background: linear-gradient(45deg, #ff8fab, #ff4d88);
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(255, 105, 135, 0.4);
}

.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(255, 105, 135, 0.6);
}
</style>
</head>

<body>

<div class="container">
    <h1>HappyMoment.web 💗</h1>
    <div class="sub">รับทำเว็บน่ารักๆ สำหรับคนพิเศษของคุณ</div>

    <div class="box">
        <h3>🎂 วันเกิดแฟน</h3>
        <div class="price">129 บาท</div>
        <p>รอ 1-3 วัน</p>
    </div>

    <div class="box">
        <h3>💑 วันครบรอบ</h3>
        <div class="price">199 บาท</div>
        <p>รอ 1-3 วัน</p>
    </div>

    <div class="box">
        <h3>💌 ให้กำลังใจแฟน</h3>
        <div class="price">99 บาท</div>
        <p>รอ 1-3 วัน</p>
    </div>

    <div class="box urgent">
        <div class="section-title">⚡ แบบเร่งด่วน (ภายใน 24 ชม.)</div>
        <p>🎂 วันเกิดแฟน 229 บาท</p>
        <p>💑 วันครบรอบ 299 บาท</p>
        <p>💌 ให้กำลังใจ 199 บาท</p>
    </div>

    <a href="#" class="btn">แอดไลน์ @238snzcp</a>
</div>

</body>
</html>
